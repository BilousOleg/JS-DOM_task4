<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./assets/css/reset.css" />
    <link rel="stylesheet" href="./assets/css/style.css" />
    <script defer src="./assets/js/index.js"></script>
  </head>
  <body>
    <main class="form-page">
      <section class="form-section">
        <h2 class="form-heading">Contact form</h2>
        <p class="form-description">
          Please fill in your information and we'll be sending your order
        </p>

        <form class="contact-form">
          <fieldset class="form-row">
            <span class="form-label">Your name</span>

            <input
              class="interactive-element"
              type="text"
              placeholder="first name"
            />
            <input
              class="interactive-element"
              type="text"
              placeholder="last name"
            />
          </fieldset>

          <label class="form-row">
            <span class="form-label">Your email</span>
            <input
              class="interactive-element"
              type="email"
              placeholder="your_mail@mail.com"
            />
          </label>

          <fieldset class="form-row">
            <span class="form-label">Phone</span>

            <input class="interactive-element" type="text" placeholder="000" />
            <input class="interactive-element" type="text" placeholder="000" />
            <input class="interactive-element" type="text" placeholder="0000" />
          </fieldset>

          <label class="form-row">
            <span class="form-label">Message subject</span>
            <select class="interactive-element">
              <option value="other">Other</option>
              <option value="option2">Option2</option>
              <option value="option3">Option3</option>
            </select>
          </label>

          <label class="form-row">
            <span class="form-label">Message</span>
            <textarea class="interactive-element"></textarea>
          </label>

          <button class="submit-btn" type="submit">Submit Form</button>
        </form>
      </section>
    </main>
  </body>
</html>
